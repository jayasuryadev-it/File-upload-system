<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/">File Upload System</a>

        <div>

            {% if current_user.is_authenticated %}

                <a class="btn btn-light btn-sm" href="{{ url_for('main.dashboard') }}">Dashboard</a>

                <a class="btn btn-danger btn-sm" href="{{ url_for('main.logout') }}">Logout</a>

            {% else %}

                <a class="btn btn-light btn-sm" href="{{ url_for('main.login') }}">Login</a>

                <a class="btn btn-warning btn-sm" href="{{ url_for('main.signup') }}">Signup</a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container-lg mt-5">

    {% block content %}

    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
